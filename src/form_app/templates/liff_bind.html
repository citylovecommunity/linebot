<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>綁定 LINE — CityLove</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦄</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --brand: #c0506a; --brand-light: #fff0f5; }
    body { background: #fdf6f9; }
    .card { border-radius: 1.25rem; }
    .status-icon { font-size: 3.5rem; }
    .btn-brand { background: var(--brand); color: #fff; border: none; border-radius: .75rem; }
    .btn-brand:hover { background: #8c2d42; color: #fff; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow p-4 text-center" style="max-width:360px;width:100%;">

    <!-- Spinner shown while LIFF initialises -->
    <div id="loading">
      <div class="spinner-border text-success mb-3" role="status"></div>
      <p class="text-muted">正在初始化…</p>
    </div>

    <!-- Phone-number entry (no-token flow) -->
    <div id="phone-form" class="d-none">
      <div class="status-icon mb-2">📱</div>
      <h5 class="fw-bold">綁定手機號碼</h5>
      <p class="text-muted small mb-3">輸入您在 CityLove 註冊時使用的手機號碼，完成 LINE 帳號綁定。</p>
      <input id="phone-input" type="tel" class="form-control mb-3 text-center"
             placeholder="09XXXXXXXX" maxlength="10" inputmode="numeric">
      <div id="phone-error" class="text-danger small mb-2 d-none"></div>
      <button id="phone-submit" class="btn btn-brand w-100 fw-bold py-2">確認綁定</button>
    </div>

    <!-- Result (both flows) -->
    <div id="result" class="d-none">
      <div class="status-icon mb-2" id="result-icon"></div>
      <h5 id="result-title" class="fw-bold mt-2"></h5>
      <p id="result-msg" class="text-muted small"></p>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const LIFF_ID = {{ liff_id | tojson }};

    function show(icon, title, msg, color) {
      document.getElementById('loading').classList.add('d-none');
      document.getElementById('phone-form').classList.add('d-none');
      document.getElementById('result').classList.remove('d-none');
      document.getElementById('result-icon').textContent = icon;
      document.getElementById('result-title').textContent = title;
      document.getElementById('result-title').className = 'fw-bold mt-2 text-' + color;
      document.getElementById('result-msg').textContent = msg;
    }

    async function callBind(payload) {
      const resp = await fetch('/liff/bind', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      return resp.json();
    }

    function handleBindResult(body) {
      if (body.ok) {
        show('✅', '綁定成功！', '你的 LINE 帳號已與 CityLove 會員資料連結，之後配對通知將透過 LINE 發送。', 'success');
      } else if (body.error === 'invalid_or_expired_token') {
        show('⏰', '連結已過期', '此連結有效期為 7 天，請重新登入會員中心取得新連結。', 'warning');
      } else if (body.error === 'line_account_already_used') {
        show('⚠️', 'LINE 帳號已被使用', '此 LINE 帳號已綁定其他手機號碼，請聯繫客服處理。', 'warning');
      } else if (body.error === 'member_not_found') {
        show('❓', '查無此會員', '找不到此手機號碼的會員資料，請確認號碼後重試，或聯繫客服。', 'danger');
      } else {
        show('❌', '綁定失敗', '請稍後重試或聯繫客服。', 'danger');
      }
    }

    async function run() {
      if (!LIFF_ID) {
        show('⚠️', '設定錯誤', 'LIFF 尚未設定，請聯繫客服。', 'danger');
        return;
      }

      try {
        await liff.init({ liffId: LIFF_ID });
      } catch (e) {
        show('❌', '初始化失敗', '請關閉後重試，或聯繫客服。', 'danger');
        return;
      }

      if (!liff.isInClient()) {
        show('📱', '請在 LINE 內開啟', '請複製連結，在 LINE App 內貼上並開啟。', 'warning');
        return;
      }

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      let profile;
      try {
        profile = await liff.getProfile();
      } catch (e) {
        show('❌', '無法取得 LINE 資訊', '請關閉後重試。', 'danger');
        return;
      }

      const token = new URLSearchParams(location.search).get('token');

      if (token) {
        // Token flow (from join page / member centre): auto-bind immediately
        try {
          const body = await callBind({ token, line_user_id: profile.userId });
          handleBindResult(body);
        } catch (e) {
          show('❌', '網路錯誤', '請確認網路連線後重試。', 'danger');
        }
      } else {
        // No-token flow (from rich menu): ask for phone number
        document.getElementById('loading').classList.add('d-none');
        document.getElementById('phone-form').classList.remove('d-none');

        document.getElementById('phone-submit').addEventListener('click', async () => {
          const phone = document.getElementById('phone-input').value.trim();
          const errEl = document.getElementById('phone-error');

          if (!/^09\d{8}$/.test(phone)) {
            errEl.textContent = '請輸入正確的手機號碼格式（09 開頭，共 10 碼）';
            errEl.classList.remove('d-none');
            return;
          }
          errEl.classList.add('d-none');

          document.getElementById('phone-submit').disabled = true;
          document.getElementById('phone-submit').textContent = '綁定中…';

          try {
            const body = await callBind({ phone_number: phone, line_user_id: profile.userId });
            handleBindResult(body);
          } catch (e) {
            show('❌', '網路錯誤', '請確認網路連線後重試。', 'danger');
          }
        });
      }
    }

    run();
  </script>
</body>
</html>
