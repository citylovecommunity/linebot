<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資料已送出 — CityLove</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦄</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5 text-center" style="max-width: 480px;">
  <div style="font-size:4rem;">✅</div>
  <h2 class="mt-3 fw-bold">資料已送出！</h2>
  <p class="text-muted mt-2">謝謝你，{{ member.name }}！我們已收到你的資料，近期會安排為你配對。</p>

  {% if liff_url %}
  <div class="card shadow-sm mt-4 text-start">
    <div class="card-body">
      <h6 class="fw-bold mb-1">最後一步：綁定 LINE 帳號</h6>
      <p class="text-muted small mb-3">綁定後，配對通知會直接發送到你的 LINE，不會錯過任何消息。</p>
      <a href="{{ liff_url }}" class="btn btn-success w-100" target="_blank" rel="noopener">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="me-1" viewBox="0 0 16 16">
          <path d="M8 0c4.411 0 8 2.912 8 6.492 0 2.907-2.236 5.356-5.376 6.04-.285.063-.646-.054-.784-.33l-.562-1.12c-.128-.255-.044-.56.198-.692C11.796 9.71 13 8.22 13 6.492 13 4.02 10.762 2 8 2S3 4.02 3 6.492c0 1.728 1.204 3.218 3.524 3.898.242.132.326.437.198.692l-.562 1.12c-.138.276-.499.393-.784.33C2.236 11.848 0 9.399 0 6.492 0 2.912 3.589 0 8 0z"/>
          <path d="M5 6.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm4 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm4 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/>
        </svg>
        在 LINE 中完成綁定
      </a>
    </div>
  </div>
  {% endif %}

  <p class="text-muted small mt-4">如有任何問題，請聯繫服務人員。</p>
</div>
</body>
</html>
